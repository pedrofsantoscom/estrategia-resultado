></app-nav>

<main id="main-content">
  <app-hero
    (openModal)="openModal()"
  ></app-hero>

  <app-services-section

  ></app-services-section>

  <app-about></app-about>

  <app-location></app-location>

  <app-contacts></app-contacts>

<app-footer></app-footer>

></app-quick-contact-modal>

<section id="localizacao" class="py-20 lg:py-28 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Section header -->
    <div class="text-center mb-12">
      <p class="text-er-gold font-semibold text-sm tracking-widest uppercase mb-3" i18n="@@location.label">Onde estamos</p>
      <h2 class="section-heading mb-4" i18n="@@location.heading">Localização</h2>
      <div class="gold-divider mx-auto mb-5"></div>
      <p class="section-subheading max-w-xl mx-auto" i18n="@@location.subheading">
        Encontre-nos no coração de Guimarães, cidade Berço de Portugal.
      </p>
    </div>

    <div class="grid lg:grid-cols-2 gap-8 items-start">

      <!-- Address info -->
      <div class="bg-er-cream rounded-2xl p-8 lg:p-10">
        <h3 class="font-display font-bold text-er-navy text-xl mb-6" i18n="@@location.findUs">Como nos encontrar</h3>

        <div class="space-y-5">
          <div class="flex gap-4">
            <div class="flex-shrink-0 w-10 h-10 rounded-xl bg-er-navy/10 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-er-navy" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </div>
            <div>
              <p class="font-semibold text-er-navy text-sm mb-0.5" i18n="@@location.address.label">Morada</p>
              <p class="text-er-navy/70 text-sm leading-relaxed">Guimarães, Portugal</p>
            </div>
          </div>

          <div class="flex gap-4">
            <div class="flex-shrink-0 w-10 h-10 rounded-xl bg-er-navy/10 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-er-navy" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
            </div>
            <div>
              <p class="font-semibold text-er-navy text-sm mb-0.5" i18n="@@location.phone.label">Telefone</p>
              <a href="tel:+351000000000" class="text-er-blue hover:text-er-gold text-sm transition-colors">+351 000 000 000</a>
            </div>
          </div>

          <div class="flex gap-4">
            <div class="flex-shrink-0 w-10 h-10 rounded-xl bg-er-navy/10 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-er-navy" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </div>
            <div>
              <p class="font-semibold text-er-navy text-sm mb-0.5">Email</p>
              <a href="mailto:geral@estrategiaeresultado.pt" class="text-er-blue hover:text-er-gold text-sm transition-colors break-all">geral&#64;estrategiaeresultado.pt</a>
            </div>
          </div>

          <div class="flex gap-4">
            <div class="flex-shrink-0 w-10 h-10 rounded-xl bg-er-navy/10 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-er-navy" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <div>
              <p class="font-semibold text-er-navy text-sm mb-0.5" i18n="@@location.hours.label">Horário</p>
              <p class="text-er-navy/70 text-sm" i18n="@@location.hours.value">Segunda a Sexta: 9h00 – 18h00</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Map embed -->
      <div class="rounded-2xl overflow-hidden shadow-lg" style="height: 380px;">
        <iframe
          title="Localização Estratégia &amp; Resultado em Guimarães"
          i18n-title="@@location.map.title"
          width="100%"
          height="100%"
          style="border:0;"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d47596.78!2d-8.2901!3d41.4425!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd2465d13d4d37eb%3A0x500ef6143a29917!2sGuimar%C3%A3es!5e0!3m2!1spt!2spt!4v1700000000000"
          allowfullscreen>
        </iframe>
      </div>

    </div>
  </div>
</section>

@if (isOpen) {
  <!-- Backdrop -->
  <div
    class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background: rgba(26, 39, 68, 0.75); backdrop-filter: blur(4px);"
    (click)="onBackdropClick($event)"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <!-- Panel -->
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md relative">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-er-navy/10">
        <div>
          <h2 id="modal-title" class="font-display font-bold text-er-navy text-lg">Pedir Contacto</h2>
          <p class="text-er-navy/60 text-xs mt-0.5">Ligamos-lhe em breve.</p>
        </div>
        <button
          (click)="close.emit()"
          class="text-er-navy/40 hover:text-er-navy transition-colors rounded-lg p-1.5 hover:bg-er-navy/5 focus:outline-none focus:ring-2 focus:ring-er-navy/20"
          aria-label="Fechar modal"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="px-6 py-5">
        @if (submitted()) {
          <div class="text-center py-6">
            <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
            </div>
            <h3 class="font-semibold text-er-navy text-base mb-1">Pedido recebido!</h3>
            <p class="text-er-navy/60 text-sm">Entraremos em contacto consigo em breve.</p>
            <button (click)="close.emit()" class="mt-5 btn-primary text-sm px-6 py-2.5">Fechar</button>
          </div>
        } @else {
          <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" novalidate>

            <!-- Name -->
            <div>
              <label for="qc-name" class="block text-sm font-semibold text-er-navy mb-1.5">
                Nome <span class="text-red-500">*</span>
              </label>
              <input
                id="qc-name"
                type="text"
                formControlName="name"
                autocomplete="name"
                placeholder="O seu nome"
                class="w-full rounded-lg border px-4 py-3 text-sm text-er-navy placeholder:text-er-navy/30 focus:outline-none focus:ring-2 focus:ring-er-blue/40 transition-colors"
                [class.border-red-400]="isInvalid('name')"
                [class.border-er-navy/20]="!isInvalid('name')"
              >
              @if (isInvalid('name')) {
                <p class="mt-1 text-xs text-red-500">Nome obrigatório.</p>
              }
            </div>

            <!-- Phone -->
            <div>
              <label for="qc-phone" class="block text-sm font-semibold text-er-navy mb-1.5">
                Telefone <span class="text-red-500">*</span>
              </label>
              <input
                id="qc-phone"
                type="tel"
                formControlName="phone"
                autocomplete="tel"
                placeholder="+351 9XX XXX XXX"
                class="w-full rounded-lg border px-4 py-3 text-sm text-er-navy placeholder:text-er-navy/30 focus:outline-none focus:ring-2 focus:ring-er-blue/40 transition-colors"
                [class.border-red-400]="isInvalid('phone')"
                [class.border-er-navy/20]="!isInvalid('phone')"
              >
              @if (isInvalid('phone')) {
                <p class="mt-1 text-xs text-red-500">Telefone obrigatório.</p>
              }
            </div>

            <!-- Preferred time -->
            <div>
              <label for="qc-time" class="block text-sm font-semibold text-er-navy mb-1.5">Melhor horário</label>
              <select
                id="qc-time"
                formControlName="preferred_time"
                class="w-full rounded-lg border border-er-navy/20 px-4 py-3 text-sm text-er-navy bg-white focus:outline-none focus:ring-2 focus:ring-er-blue/40"
              >
                <option value="Qualquer horário">Qualquer horário</option>
                @for (t of preferredTimes; track t) {
                  <option [value]="t">{{ t }}</option>
                }
              </select>
            </div>

            <!-- Service -->
            <div>
              <label for="qc-service" class="block text-sm font-semibold text-er-navy mb-1.5">Serviço</label>
              <select
                id="qc-service"
                formControlName="service"
                class="w-full rounded-lg border border-er-navy/20 px-4 py-3 text-sm text-er-navy bg-white focus:outline-none focus:ring-2 focus:ring-er-blue/40"
              >
                <option value="">Seleccionar serviço *</option>
                @for (svc of services; track svc.id) {
                  <option [value]="svc.name">{{ svc.name }}</option>
                }
              </select>
            </div>

            <!-- Turnstile -->
            <div
              class="cf-turnstile"
              [attr.data-sitekey]="turnstileSiteKey"
              data-theme="light"
            ></div>

            <!-- Error -->
            @if (error()) {
              <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
                {{ error() }}
              </div>
            }

            <!-- Submit -->
            <button
              type="submit"
              [disabled]="submitting()"
              class="btn-primary w-full py-3 text-sm disabled:opacity-60 disabled:cursor-not-allowed"
            >
              @if (submitting()) {
                <svg class="animate-spin h-4 w-4 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                A enviar…
              } @else {
                Pedir Contacto
              }
            </button>

          </form>
        }
      </div>
    </div>
  </div>
}

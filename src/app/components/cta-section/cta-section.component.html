<section class="py-16 lg:py-24 bg-er-navy">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Section header -->
    <div class="text-center mb-12">
      <p class="text-er-gold font-semibold text-sm tracking-widest uppercase mb-3">Contacte-nos</p>
      <h2 class="font-display font-bold text-3xl lg:text-4xl text-white mb-4">
        Quer saber mais? Tem dúvidas?
      </h2>
      <div class="w-16 h-0.5 bg-er-gold mx-auto mb-6"></div>
      <p class="text-white/70 text-lg max-w-2xl mx-auto">
        Estamos disponíveis para o ajudar. Escolha a forma de contacto que preferir.
      </p>
    </div>

    <!-- 4 action cards: 2x2 on mobile, 4 columns on desktop -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-6 max-w-4xl mx-auto">

      <!-- Phone -->
      <a
        href="tel:+351000000000"
        class="flex flex-col items-center text-center p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-er-gold/15 hover:border-er-gold/40 transition-all duration-200 group"
      >
        <div class="w-14 h-14 rounded-2xl bg-er-gold/20 group-hover:bg-er-gold/30 flex items-center justify-center mb-4 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-er-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
        </div>
        <h3 class="font-semibold text-white text-base mb-1">Telefone</h3>
        <p class="text-white/60 text-sm group-hover:text-white/80 transition-colors">+351 000 000 000</p>
      </a>

      <!-- Email -->
      <a
        href="mailto:geral@estrategiaeresultado.pt"
        class="flex flex-col items-center text-center p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-er-gold/15 hover:border-er-gold/40 transition-all duration-200 group"
      >
        <div class="w-14 h-14 rounded-2xl bg-er-gold/20 group-hover:bg-er-gold/30 flex items-center justify-center mb-4 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-er-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <h3 class="font-semibold text-white text-base mb-1">Email</h3>
        <p class="text-white/60 text-sm group-hover:text-white/80 transition-colors break-all">geral&#64;estrategiaeresultado.pt</p>
      </a>

      <!-- WhatsApp -->
      <a
        href="https://wa.me/351000000000"
        target="_blank"
        rel="noopener noreferrer"
        class="flex flex-col items-center text-center p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-er-gold/15 hover:border-er-gold/40 transition-all duration-200 group"

        <div class="w-14 h-14 rounded-2xl bg-er-gold/20 group-hover:bg-er-gold/30 flex items-center justify-center mb-4 transition-colors">

        <p class="text-white/60 text-sm group-hover:text-white/80 transition-colors">+351 000 000 000</p>
      </a>

      <!-- Contact Form -->
      <button
        type="button"
        (click)="scrollToForm()"
        class="flex flex-col items-center text-center p-6 rounded-2xl bg-white/5 border border-white/10 hover:bg-er-gold/15 hover:border-er-gold/40 transition-all duration-200 group w-full cursor-pointer"
      >
        <div class="w-14 h-14 rounded-2xl bg-er-gold/20 group-hover:bg-er-gold/30 flex items-center justify-center mb-4 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-er-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
        <h3 class="font-semibold text-white text-base mb-1">Formulário</h3>
        <p class="text-white/60 text-sm group-hover:text-white/80 transition-colors">Envie-nos uma mensagem</p>

<section id="servicos" class="py-20 lg:py-28 bg-er-cream">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Section header -->
    <div class="text-center mb-14">
      <p class="text-er-gold font-semibold text-sm tracking-widest uppercase mb-3">O que fazemos</p>
      <h2 class="section-heading mb-4">Os Nossos Serviços</h2>
      <div class="gold-divider mx-auto mb-5"></div>
      <p class="section-subheading max-w-2xl mx-auto">
        Soluções completas e personalizadas para particulares e empresas em Guimarães e região.
      </p>
    </div>

    <!-- Services grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (service of services; track service.id) {
        <div class="card-hover flex flex-col p-6">
          <!-- Icon -->
          <div class="w-12 h-12 rounded-xl bg-er-navy/5 flex items-center justify-center mb-4 text-er-blue flex-shrink-0">
            <div class="w-7 h-7 text-er-blue" [innerHTML]="service.icon"></div>
          </div>

          <!-- Content -->
          <h3 class="font-semibold text-er-navy text-base mb-2 leading-snug">{{ service.name }}</h3>
          <p class="text-er-navy/60 text-sm leading-relaxed flex-1">{{ service.description }}</p>

          <!-- CTA -->
          <button
            (click)="onContactService(service.name)"
            class="mt-5 w-full text-center text-xs font-semibold text-er-blue hover:text-er-navy border border-er-blue/30 hover:border-er-navy hover:bg-er-navy hover:text-white rounded-lg py-2.5 px-3 transition-all duration-200"
          >
            Contactar sobre este serviço
          </button>
        </div>
      }
    </div>
  </div>
</section>
